<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 - Page Not Found</title>
  <script src="tailwind.js"></script>
    <link rel="icon" href="images\logo.jpeg">

  <style>
    .neon-glow {
      text-shadow: 0 0 5px #39FF14, 0 0 10px #39FF14, 0 0 20px #39FF14, 0 0 40px #39FF14;
    }

    .neon-border {
      box-shadow: 0 0 10px #39FF14, 0 0 20px rgba(57,255,20,0.5);
    }

    .flicker {
      animation: flicker 2s infinite;
    }

    @keyframes flicker {
      0%, 18%, 22%, 25%, 53%, 57%, 100% { opacity: 1; }
      20%, 24%, 55% { opacity: 0.4; }
    }
  </style>
</head>
<body class="bg-black text-white min-h-screen flex items-center justify-center px-4">

  <div class="text-center max-w-2xl w-full">

    <!-- 404 Title -->
    <h1 class="text-[120px] sm:text-[150px] font-extrabold neon-glow flicker">
      404
    </h1>

    <!-- Subtitle -->
    <h2 class="text-2xl sm:text-3xl font-semibold mb-4">
      Oops! Your Neon Went Dark ⚡
    </h2>

    <!-- Description -->
    <p class="text-gray-400 mb-8 text-sm sm:text-base">
      The page you're looking for doesn’t exist or has been moved. Let's light your way back!
    </p>

    <!-- Buttons -->
    <div class="flex flex-col sm:flex-row items-center justify-center gap-4">
      <a href="/" class="px-6 py-3 bg-[#39FF14] text-black font-semibold rounded-full neon-border hover:scale-105 transition-transform">
        Go Home
      </a>

      <a href="/contact" class="px-6 py-3 border border-[#39FF14] text-[#39FF14] rounded-full hover:bg-[#39FF14] hover:text-black transition-all">
        Contact Support
      </a>
    </div>

    <!-- Decorative Neon Line -->
    <div class="mt-12 h-[2px] w-full bg-gradient-to-r from-transparent via-[#39FF14] to-transparent opacity-60"></div>

    <!-- Footer Text -->
    <p class="mt-6 text-xs text-gray-500">
      © 2026 Custom Neon & LED Art Studio. All rights reserved.
    </p>

  </div>

</body>
</html>
